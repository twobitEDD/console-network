name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint + build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build package
        run: npm run build:console

      - name: Run package smoke tests
        run: node --test test/*.test.mjs

      - name: Registry build (check up-to-date)
        run: node scripts/build-registry.mjs --check
